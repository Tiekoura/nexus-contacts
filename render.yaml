services:
  - type: web
    name: nexus-contacts
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: FLASK_ENV
        value: production
